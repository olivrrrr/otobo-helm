apiVersion: v1
kind: Service
metadata:
  name: {{ include "otobo.fullname" . }}-web
  labels:
    {{- include "otobo.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "otobo.selectorLabels" . | nindent 4 }}
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
