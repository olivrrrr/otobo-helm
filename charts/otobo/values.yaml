# OTOBO Helm Chart Values

image:
  repository: rotheross/otobo
  tag: latest-10_1
  pullPolicy: IfNotPresent

# Database configuration (ConfigMap)
db:
  host: "otobo-service-mysql"
  port: "3306"
  name: "otobo"
  user: "otobo"

# Database password (Secret)
# Set via --set db.password=yourpassword or override in secret
secret:
  # If existingSecret is set, use an existing secret instead of creating one
  existingSecret: ""
  existingSecretKey: "OTOBO_DB_PASSWORD"
  # Password used if no existingSecret is set
  password: "changeme"

persistence:
  storageClass: "your-storage-class"
  size: 10Gi
  accessMode: ReadWriteOnce

nginx:
  image:
    repository: nginx
    tag: alpine
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 80

resources:
  web:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  daemon:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "250m"

replicaCount: 1
